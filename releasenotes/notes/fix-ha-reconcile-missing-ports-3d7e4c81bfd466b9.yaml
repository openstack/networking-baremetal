---
fixes:
  - |
    Fixed HA chassis group alignment reconciliation to properly look up ports
    in OVN using the correct "neutron-" prefixed naming convention. Port
    lookups now handle RowNotFound exceptions gracefully and prevent misleading
    ERROR logs for expected conditions. See
    `bug 2144061 <https://bugs.launchpad.net/networking-baremetal/+bug/2144061>`_.
