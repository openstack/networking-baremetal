---
features:
  - |
    Added HA chassis group alignment reconciliation to ironic-neutron-agent
    to address connectivity issues for baremetal nodes in OVN deployments
    (Launchpad bug #1995078).

    When router gateway ports and baremetal external ports have mismatched
    HA chassis group priorities, baremetal nodes can experience intermittent
    external connectivity failures. This occurs when different chassis are
    active for the router vs. the baremetal port, causing inconsistent
    routing.

    The ironic-neutron-agent now includes a periodic reconciliation loop
    that ensures router ports use the same ha_chassis_group as baremetal
    external ports on the same network. This eliminates priority mismatches
    and prevents connectivity failures.

    Key features:

    * Automatic alignment of HA chassis groups between router and baremetal
      ports
    * Distributed across multiple agents via hash ring for scalability
    * Time-windowed reconciliation to minimize API load (only checks
      recently created/updated resources by default)
    * Configurable reconciliation interval (default: 10 minutes)
    * Enabled by default

    Configuration options in the ``[baremetal_agent]`` section:

    * ``enable_ha_chassis_group_alignment`` - Enable/disable the feature
      (default: True)
    * ``ha_chassis_group_alignment_interval`` - Reconciliation interval in
      seconds (default: 600, minimum: 60)
    * ``limit_ha_chassis_group_alignment_to_recent_changes_only`` - Only
      check recently updated resources (default: True)
    * ``ha_chassis_group_alignment_window`` - Time window for recent
      resources in seconds (default: 1200)

    See the HA Chassis Group Alignment documentation for detailed
    configuration guidance and troubleshooting information.
fixes:
  - |
    Fixes intermittent external connectivity failures for baremetal nodes
    in OVN deployments caused by mismatched HA chassis group priorities
    between router gateway ports and baremetal external ports (Launchpad
    bug #1995078). The ironic-neutron-agent now automatically aligns HA
    chassis group configuration to ensure consistent routing behavior.
